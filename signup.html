<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign up · Stationly</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23e8a33d'/%3E%3Cpath d='M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46' stroke='%231c1a15' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <header class="auth-head">
      <a href="./app.html" class="brand">
        <svg width="32" height="32" viewBox="0 0 64 64" fill="none" aria-label="Stationly">
          <rect width="64" height="64" rx="14" fill="#e8a33d"/>
          <path d="M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46" stroke="#1c1a15" stroke-width="5" stroke-linecap="round" fill="none"/>
        </svg>
        <span>Stationly</span>
      </a>
    </header>

    <section class="auth-card">
      <h1>Start your 30-day trial</h1>
      <p class="auth-sub">No card required. Cancel anytime.</p>

      <form id="signup-form" class="auth-form" autocomplete="on">
        <label>
          <span>Your name</span>
          <input type="text" name="fullName" required autocomplete="name" placeholder="Anthony Rossi">
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@restaurant.com">
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" required autocomplete="new-password" minlength="8" placeholder="at least 8 characters">
        </label>
        <div id="signup-error" class="auth-error" hidden></div>
        <button type="submit" class="btn-primary" id="signup-btn">Create account</button>
      </form>

      <p class="auth-alt">
        Already have an account? <a href="./login.html">Sign in</a>
      </p>
    </section>

    <footer class="auth-foot">
      <span>© 2026 Stationly</span>
      <span>·</span>
      <a href="./legal/terms.html">Terms</a>
      <span>·</span>
      <a href="./legal/privacy.html">Privacy</a>
    </footer>
  </main>

  <script type="module">
    import { supabase, getSession } from './supabaseClient.js';

    const existing = await getSession();
    if (existing) window.location.href = './app.html';

    const form = document.getElementById('signup-form');
    const errBox = document.getElementById('signup-error');
    const btn = document.getElementById('signup-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.hidden = true;
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      const fd = new FormData(form);
      const { data, error } = await supabase.auth.signUp({
        email: fd.get('email'),
        password: fd.get('password'),
        options: {
          data: { full_name: fd.get('fullName') },
          emailRedirectTo: new URL('./onboarding.html', window.location.href).toString(),
        },
      });

      if (error) {
        errBox.textContent = error.message;
        errBox.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Create account';
        return;
      }

      // If Supabase project has email confirmation off (default in dev), session exists immediately
      if (data.session) {
        window.location.href = './onboarding.html';
      } else {
        // Email confirmation required — show message
        errBox.classList.add('auth-success');
        errBox.textContent = 'Check your email to confirm your account, then log in.';
        errBox.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
