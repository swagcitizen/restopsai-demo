<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign up · Stationly</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <meta name="description" content="Start your 30-day Stationly trial. No card required." />
  <meta name="theme-color" content="#faf5ea" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1c1a15" media="(prefers-color-scheme: dark)" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stationly" />
  <meta name="mobile-web-app-capable" content="yes" />
  <script src="/pwa.js" defer></script>
</head>
<body class="auth-body">
  <main class="auth-shell">
    <header class="auth-head">
      <a href="./app.html" class="brand">
        <svg width="32" height="32" viewBox="0 0 64 64" fill="none" aria-label="Stationly">
          <rect width="64" height="64" rx="14" fill="#e8a33d"/>
          <path d="M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46" stroke="#1c1a15" stroke-width="5" stroke-linecap="round" fill="none"/>
        </svg>
        <span>Stationly</span>
      </a>
    </header>

    <section class="auth-card">
      <h1>Start your 30-day trial</h1>
      <p class="auth-sub">No card required. Cancel anytime.</p>

      <form id="signup-form" class="auth-form" autocomplete="on">
        <label>
          <span>Your name</span>
          <input type="text" name="fullName" required autocomplete="name" placeholder="Anthony Rossi">
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" id="signup-email" required autocomplete="email" placeholder="you@restaurant.com" aria-describedby="email-hint">
          <small id="email-hint" class="field-hint" hidden></small>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" id="signup-password" required autocomplete="new-password" minlength="8" placeholder="at least 8 characters" aria-describedby="pw-hint">
          <div class="pw-meter" id="pw-meter" hidden>
            <div class="pw-meter-bar"><span id="pw-meter-fill"></span></div>
            <small id="pw-hint" class="field-hint"></small>
          </div>
        </label>
        <label class="auth-check">
          <input type="checkbox" name="agree" required>
          <span>I agree to the <a href="./legal/terms.html" target="_blank" rel="noopener">Terms</a> and <a href="./legal/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.</span>
        </label>
        <div id="signup-error" class="auth-error" hidden></div>
        <button type="submit" class="btn-primary" id="signup-btn">Create account</button>
      </form>

      <p class="auth-alt">
        Already have an account? <a href="./login.html?nodemo=1">Sign in</a>
      </p>
    </section>

    <footer class="auth-foot">
      <span>© 2026 Stationly</span>
      <span>·</span>
      <a href="./legal/terms.html">Terms</a>
      <span>·</span>
      <a href="./legal/privacy.html">Privacy</a>
    </footer>
  </main>

  <script type="module">
    import { supabase, getSession } from './supabaseClient.js';

    const existing = await getSession();
    if (existing) window.location.href = './app.html';

    const form = document.getElementById('signup-form');
    const errBox = document.getElementById('signup-error');
    const btn = document.getElementById('signup-btn');

    // ---- Real-time field validation ---------------------------------
    const emailInput = document.getElementById('signup-email');
    const emailHint  = document.getElementById('email-hint');
    const pwInput    = document.getElementById('signup-password');
    const pwMeter    = document.getElementById('pw-meter');
    const pwFill     = document.getElementById('pw-meter-fill');
    const pwHint     = document.getElementById('pw-hint');

    const EMAIL_RX = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

    function showHint(el, msg, kind) {
      if (!msg) { el.hidden = true; el.textContent = ''; el.className = 'field-hint'; return; }
      el.hidden = false;
      el.textContent = msg;
      el.className = 'field-hint ' + (kind || '');
    }

    function validateEmail() {
      const v = (emailInput.value || '').trim();
      if (!v) return showHint(emailHint, '');
      if (!EMAIL_RX.test(v)) return showHint(emailHint, "That email doesn't look right.", 'err');
      return showHint(emailHint, 'Looks good.', 'ok');
    }

    function scorePassword(v) {
      let s = 0;
      if (v.length >= 8) s++;
      if (v.length >= 12) s++;
      if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
      if (/\d/.test(v)) s++;
      if (/[^A-Za-z0-9]/.test(v)) s++;
      return Math.min(s, 4);
    }

    function validatePassword() {
      const v = pwInput.value || '';
      if (!v) { pwMeter.hidden = true; return; }
      pwMeter.hidden = false;
      const score = scorePassword(v);
      const labels = ['Too weak', 'Weak', 'Okay', 'Strong', 'Very strong'];
      const colors = ['#c9302c', '#c9302c', '#c9831b', '#3b6e3b', '#2e8b57'];
      pwFill.style.width = ((score / 4) * 100) + '%';
      pwFill.style.background = colors[score];
      let msg = labels[score];
      if (v.length < 8) msg = 'At least 8 characters required.';
      pwHint.textContent = msg;
      pwHint.className = 'field-hint ' + (score >= 2 ? 'ok' : 'err');
    }

    emailInput.addEventListener('input', validateEmail);
    emailInput.addEventListener('blur', validateEmail);
    pwInput.addEventListener('input', validatePassword);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.hidden = true;

      const fd = new FormData(form);
      const email = (fd.get('email') || '').toString().trim();
      const password = (fd.get('password') || '').toString();

      // Pre-flight client validation
      if (!EMAIL_RX.test(email)) {
        errBox.classList.remove('auth-success');
        errBox.textContent = "Please enter a valid email address.";
        errBox.hidden = false;
        emailInput.focus();
        return;
      }
      if (password.length < 8) {
        errBox.classList.remove('auth-success');
        errBox.textContent = 'Password must be at least 8 characters.';
        errBox.hidden = false;
        pwInput.focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { full_name: fd.get('fullName') },
          emailRedirectTo: new URL('./verify.html', window.location.href).toString(),
        },
      });

      if (error) {
        errBox.classList.remove('auth-success');
        // Friendlier copy for common cases
        let msg = error.message || 'Something went wrong. Try again.';
        if (/already registered|user already/i.test(msg)) {
          msg = 'An account with that email already exists. Try signing in instead.';
        } else if (/password/i.test(msg) && /pwned|leak/i.test(msg)) {
          msg = 'That password has been seen in a data breach. Please choose another.';
        }
        errBox.textContent = msg;
        errBox.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Create account';
        return;
      }

      // If Supabase project has email confirmation off (default in dev), session exists immediately
      if (data.session) {
        window.location.href = './onboarding.html';
      } else {
        // Email confirmation required — show message
        errBox.classList.add('auth-success');
        errBox.textContent = 'Check your email to confirm your account, then log in.';
        errBox.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
