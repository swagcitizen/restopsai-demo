<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password · Stationly</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23e8a33d'/%3E%3Cpath d='M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46' stroke='%231c1a15' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <header class="auth-head">
      <a href="./index.html" class="brand">
        <svg width="32" height="32" viewBox="0 0 64 64" fill="none" aria-label="Stationly">
          <rect width="64" height="64" rx="14" fill="#e8a33d"/>
          <path d="M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46" stroke="#1c1a15" stroke-width="5" stroke-linecap="round" fill="none"/>
        </svg>
        <span>Stationly</span>
      </a>
    </header>

    <section class="auth-card">
      <h1>Reset your password</h1>
      <p class="auth-sub">Enter your email and we'll send you a reset link.</p>

      <form id="forgot-form" class="auth-form" autocomplete="on">
        <label>
          <span>Email</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@restaurant.com">
        </label>
        <div id="forgot-msg" class="auth-error" hidden></div>
        <button type="submit" class="btn-primary" id="forgot-btn">Send reset link</button>
      </form>

      <p class="auth-alt">
        Remembered it? <a href="./login.html?nodemo=1">Back to sign in</a>
      </p>
    </section>

    <footer class="auth-foot">
      <span>© 2026 Stationly</span>
      <span>·</span>
      <a href="./legal/terms.html">Terms</a>
      <span>·</span>
      <a href="./legal/privacy.html">Privacy</a>
    </footer>
  </main>

  <script type="module">
    import { supabase } from './supabaseClient.js';

    const form = document.getElementById('forgot-form');
    const msgBox = document.getElementById('forgot-msg');
    const btn = document.getElementById('forgot-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgBox.hidden = true;
      msgBox.classList.remove('auth-success');
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const fd = new FormData(form);
      const redirect = new URL('./reset-password.html', window.location.href).toString();
      const { error } = await supabase.auth.resetPasswordForEmail(fd.get('email'), {
        redirectTo: redirect,
      });

      if (error) {
        msgBox.textContent = error.message;
        msgBox.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Send reset link';
        return;
      }

      msgBox.classList.add('auth-success');
      msgBox.textContent = 'Check your inbox. The link expires in 1 hour.';
      msgBox.hidden = false;
      btn.textContent = 'Sent';
    });
  </script>
</body>
</html>
