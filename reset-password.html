<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choose a new password · Stationly</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23e8a33d'/%3E%3Cpath d='M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46' stroke='%231c1a15' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
  <meta name="description" content="Set a new password for your Stationly account." />
  <meta name="theme-color" content="#faf5ea" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23e8a33d'/%3E%3Cpath d='M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46' stroke='%231c1a15' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <header class="auth-head">
      <a href="./index.html" class="brand">
        <svg width="32" height="32" viewBox="0 0 64 64" fill="none" aria-label="Stationly">
          <rect width="64" height="64" rx="14" fill="#e8a33d"/>
          <path d="M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46" stroke="#1c1a15" stroke-width="5" stroke-linecap="round" fill="none"/>
        </svg>
        <span>Stationly</span>
      </a>
    </header>

    <section class="auth-card">
      <h1>Choose a new password</h1>
      <p class="auth-sub" id="reset-sub">Verifying your reset link…</p>

      <form id="reset-form" class="auth-form" autocomplete="on" hidden>
        <label>
          <span>New password</span>
          <input type="password" name="password" required autocomplete="new-password" minlength="8" placeholder="at least 8 characters">
        </label>
        <label>
          <span>Confirm password</span>
          <input type="password" name="confirm" required autocomplete="new-password" minlength="8">
        </label>
        <div id="reset-msg" class="auth-error" hidden></div>
        <button type="submit" class="btn-primary" id="reset-btn">Update password</button>
      </form>

      <div id="reset-fallback" class="auth-alt" hidden>
        <a href="./forgot-password.html">Request a new reset link</a>
      </div>
    </section>

    <footer class="auth-foot">
      <span>© 2026 Stationly</span>
    </footer>
  </main>

  <script type="module">
    import { supabase } from './supabaseClient.js';

    const sub = document.getElementById('reset-sub');
    const form = document.getElementById('reset-form');
    const msgBox = document.getElementById('reset-msg');
    const btn = document.getElementById('reset-btn');
    const fallback = document.getElementById('reset-fallback');

    // Supabase password reset link uses URL hash like #access_token=...&type=recovery.
    // The supabase-js client picks this up automatically and emits PASSWORD_RECOVERY.
    let recoveryReady = false;

    supabase.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
        recoveryReady = true;
        sub.textContent = 'Pick a new password to finish.';
        form.hidden = false;
      }
    });

    // Fallback: if no recovery event after 2.5s, show the "request new link" prompt.
    setTimeout(async () => {
      if (recoveryReady) return;
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        recoveryReady = true;
        sub.textContent = 'Pick a new password to finish.';
        form.hidden = false;
      } else {
        sub.textContent = 'This reset link is invalid or has expired.';
        fallback.hidden = false;
      }
    }, 2500);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgBox.hidden = true;
      msgBox.classList.remove('auth-success');

      const fd = new FormData(form);
      const pw = fd.get('password');
      const confirm = fd.get('confirm');
      if (pw !== confirm) {
        msgBox.textContent = 'Passwords do not match.';
        msgBox.hidden = false;
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';
      const { error } = await supabase.auth.updateUser({ password: pw });

      if (error) {
        msgBox.textContent = error.message;
        msgBox.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Update password';
        return;
      }

      msgBox.classList.add('auth-success');
      msgBox.textContent = 'Password updated. Redirecting…';
      msgBox.hidden = false;
      setTimeout(() => { window.location.href = './app.html'; }, 1200);
    });
  </script>
</body>
</html>
