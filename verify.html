<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verifying your email · Stationly</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23e8a33d'/%3E%3Cpath d='M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46' stroke='%231c1a15' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
  <meta name="description" content="Confirm your email to activate your Stationly account." />
  <meta name="theme-color" content="#faf5ea" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23e8a33d'/%3E%3Cpath d='M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46' stroke='%231c1a15' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <header class="auth-head">
      <a href="./index.html" class="brand">
        <svg width="32" height="32" viewBox="0 0 64 64" fill="none" aria-label="Stationly">
          <rect width="64" height="64" rx="14" fill="#e8a33d"/>
          <path d="M20 22 Q20 14 32 14 Q44 14 44 22 L44 24 Q44 28 36 28 L28 28 Q20 28 20 34 Q20 40 28 40 L36 40 Q44 40 44 44 L44 46 Q44 54 32 54 Q20 54 20 46" stroke="#1c1a15" stroke-width="5" stroke-linecap="round" fill="none"/>
        </svg>
        <span>Stationly</span>
      </a>
    </header>

    <section class="auth-card">
      <h1 id="verify-title">Verifying your email…</h1>
      <p class="auth-sub" id="verify-sub">Hang tight — finishing setup.</p>
      <div id="verify-spinner" class="auth-spinner" aria-hidden="true"></div>
      <div id="verify-error" class="auth-error" hidden></div>
      <p class="auth-alt" id="verify-fallback" hidden>
        <a href="./login.html?nodemo=1">Back to sign in</a>
      </p>
    </section>

    <footer class="auth-foot">
      <span>© 2026 Stationly</span>
    </footer>
  </main>

  <script type="module">
    import { supabase, getSession, getMemberships } from './supabaseClient.js';

    const title = document.getElementById('verify-title');
    const sub = document.getElementById('verify-sub');
    const spinner = document.getElementById('verify-spinner');
    const errBox = document.getElementById('verify-error');
    const fallback = document.getElementById('verify-fallback');

    function showError(msg) {
      spinner.hidden = true;
      title.textContent = 'Verification failed';
      sub.textContent = '';
      errBox.textContent = msg;
      errBox.hidden = false;
      fallback.hidden = false;
    }

    async function route() {
      const session = await getSession();
      if (!session) {
        showError('This link is invalid or has expired. Try signing in or signing up again.');
        return;
      }
      title.textContent = 'Email confirmed';
      sub.textContent = 'Taking you to setup…';
      // If they already have a tenant, jump to app; otherwise onboarding.
      const memberships = await getMemberships();
      const dest = memberships.length > 0 ? './app.html' : './onboarding.html';
      setTimeout(() => { window.location.href = dest; }, 800);
    }

    // Supabase parses the URL hash on load. Listen for SIGNED_IN, then route.
    let routed = false;
    supabase.auth.onAuthStateChange((event) => {
      if (routed) return;
      if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
        routed = true;
        route();
      }
    });

    // Fallback: if no event in 3s, check session once and decide.
    setTimeout(() => {
      if (routed) return;
      routed = true;
      route();
    }, 3000);
  </script>
</body>
</html>
